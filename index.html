<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>告白チケット発行</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
  }

  .ticket {
    width: 360px;
    padding: 28px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 16px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  textarea {
    height: 100px;
    resize: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  #shareBox {
    margin-top: 16px;
    font-size: 14px;
  }

  input.share {
    width: 100%;
    margin-top: 6px;
  }

  img {
    margin-top: 10px;
  }

  .overlay {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .hidden { display:none; }

  .big {
    font-size: 32px;
    font-weight: bold;
  }

  .small {
    opacity: 0.7;
    margin-top: 8px;
  }

</style>
</head>

<body>

<div class="ticket">

  <h1>告白チケット発行</h1>

  <input id="sender" placeholder="あなたの名前">
  <textarea id="message" placeholder="告白を書いてください"></textarea>

  <button onclick="sendTicket()">生成</button>

  <div id="shareBox"></div>

</div>

<div id="overlay" class="overlay hidden">
  <div style="text-align:center;">
    <div class="big">PRINTING...</div>
    <div class="small">チケット生成中</div>
  </div>
</div>

<script>

async function sendTicket() {

  const ticketId = Date.now().toString();
  const createdAt = new Date().toISOString();

  const data = {
    ticketId,
    sender: document.getElementById("sender").value,
    message: document.getElementById("message").value,
    status: "pending",
    createdAt
  };

  document.getElementById("overlay").classList.remove("hidden");

  await fetch("YOUR_GAS_URL", {
    method: "POST",
    body: JSON.stringify(data)
  });

  setTimeout(() => {

    document.getElementById("overlay").classList.add("hidden");

    // 🔥 ここが修正版（絶対に崩れないURL生成）
    const base =
      window.location.origin + "/kokuhaku-ticket/";

    const url =
      base + "ticket.html?id=" + ticketId;

    document.getElementById("shareBox").innerHTML = `
      <p>🎫 チケットID：${ticketId}</p>

      <p>🔗 共有URL</p>
      <input class="share" id="shareUrl" value="${url}" readonly>
      <button onclick="copyUrl()">コピー</button>

      <p>📱 QRコード</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}">
    `;

  }, 1500);

}

function copyUrl(){
  const input = document.getElementById("shareUrl");
  input.select();
  document.execCommand("copy");
  alert("コピーしたよ");
}

</script>

</body>
</html>
