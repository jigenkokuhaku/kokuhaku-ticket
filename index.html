<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>告白チケット発行</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top,#1a1a2e,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box {
  width:360px;
  padding:28px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  text-align:center;
}

input,textarea {
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

textarea { height:100px; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

#shareBox { margin-top:15px; }

img { margin-top:10px; }
</style>
</head>

<body>

<div class="box">

<h2>告白チケット発行</h2>

<input id="sender" placeholder="名前">
<textarea id="message" placeholder="告白"></textarea>

<button onclick="send()">発行</button>

<div id="shareBox"></div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

async function send() {

  const ticketId = Date.now().toString();

  const data = {
    ticketId,
    sender: sender.value,
    message: message.value,
    status: "pending",
    createdAt: new Date().toISOString()
  };

  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const base = window.location.origin + window.location.pathname.replace("index.html","");

  const url = base + "ticket.html?id=" + ticketId;

  document.getElementById("shareBox").innerHTML = `
    <p>🎫 ID: ${ticketId}</p>

    <input id="share" value="${url}" readonly>
    <button onclick="copy()">コピー</button>

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}">
  `;
}

function copy(){
  const s = document.getElementById("share");
  s.select();
  document.execCommand("copy");
  alert("コピーした");
}

</script>

</body>
</html>
