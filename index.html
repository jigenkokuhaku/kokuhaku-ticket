<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>告白チケット発行</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* 🎫 チケット本体 */
  .ticket {
    width: 340px;
    padding: 28px;
    border-radius: 18px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.2);

    box-shadow:
      0 10px 40px rgba(0, 0, 0, 0.6),
      0 0 25px rgba(0, 200, 255, 0.15);

    text-align: center;
    color: white;

    position: relative;
  }

  /* 🎟 切符っぽい穴 */
  .ticket::before,
  .ticket::after {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    background: #000;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }

  .ticket::before { left: -11px; }
  .ticket::after { right: -11px; }

  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;

    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255, 255, 255, 0.12);
    color: white;
    font-size: 14px;
  }

  textarea {
    height: 100px;
    resize: none;
  }

  /* ボタン */
  button {
    width: 100%;
    padding: 12px;
    margin-top: 14px;

    border: none;
    border-radius: 10px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;

    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.03);
  }

  /* 送信後演出 */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
  }

  .popup {
    text-align: center;
    animation: pop 0.4s ease;
  }

  .big {
    font-size: 40px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .small {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.8;
  }

  .hidden {
    display: none;
  }

  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

</style>
</head>

<body>

<div class="ticket">

  <h1>告白チケット</h1>

  <input id="sender" placeholder="あなたの名前">

  <textarea id="message" placeholder="告白を書いてください"></textarea>

  <button onclick="sendTicket()">送信</button>

</div>

<!-- 🎬 演出 -->
<div id="overlay" class="overlay hidden">
  <div class="popup">
    <div class="big">GENERATED</div>
    <div class="small">チケットが発行されました</div>
  </div>
</div>

<script>

async function sendTicket() {

  const now = new Date().toISOString();

  const data = {
    ticketId: Date.now().toString(),
    sender: document.getElementById("sender").value,
    message: document.getElementById("message").value,
    status: "pending",
    createdAt: now
  };

  document.getElementById("overlay").classList.remove("hidden");

  await fetch(
    "https://script.google.com/macros/s/AKfycbxjpQKHPSwHYvebRxQVr_Lo2I_bGRdboJRNLCf40WbkzP2pQmnKgUxmBp9QIy4_CC-TaA/exec",
    {
      method: "POST",
      body: JSON.stringify(data)
    }
  );

  setTimeout(() => {
    document.getElementById("overlay").classList.add("hidden");
  }, 1500);

}

</script>

</body>
</html>
