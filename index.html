<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
  }

  /* 🎫 チケット本体 */
  .ticket {
    width: 340px;
    padding: 28px;
    border-radius: 18px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.2);

    box-shadow:
      0 10px 40px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(0, 255, 255, 0.15);

    text-align: center;

    position: relative;
  }

  /* ✂ チケットっぽい切り込み風 */
  .ticket::before,
  .ticket::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #000;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }

  .ticket::before {
    left: -10px;
  }

  .ticket::after {
    right: -10px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  input,
  textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;

    border-radius: 10px;
    border: none;

    outline: none;

    background: rgba(255, 255, 255, 0.15);
    color: white;

    font-size: 14px;
  }

  textarea {
    height: 100px;
    resize: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;

    border: none;
    border-radius: 10px;

    font-size: 16px;
    cursor: pointer;

    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.03);
  }

  /* 送信ボタン */
  button {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
  }

  /* ラベル的余白 */
  h1 {
    opacity: 0.9;
  }
</style>
