<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>告白チケット発行</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.ticket {
  width: 360px;
  padding: 28px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

textarea { height: 100px; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#shareBox {
  margin-top: 16px;
}

.overlay {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index: 10;
}

.hidden { display: none !important; }

.big {
  font-size: 32px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="ticket">

<h2>告白チケット発行</h2>

<input id="sender" placeholder="名前">
<textarea id="message" placeholder="告白"></textarea>

<button onclick="sendTicket()">発行</button>

<div id="shareBox"></div>

</div>

<div id="overlay" class="overlay hidden">
  <div class="big">PRINTING...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

console.log("GAS_URL =", GAS_URL);
  
async function sendTicket() {

  const sender = document.getElementById("sender").value.trim();
  const message = document.getElementById("message").value.trim();

  if (!sender || !message) {
    alert("名前とメッセージを入力してね");
    return;
  }

  // 🔥 ここが修正ポイント
  const ticketId = Date.now().toString() + "-" + Math.random().toString(36).slice(2, 8);

  const data = {
    ticketId,
    sender,
    message,
    status: "pending",
    createdAt: new Date().toISOString()
  };

  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hidden");

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify(data)
    });

    await res.text();

  } catch (e) {
    console.log("GAS error:", e);
  }

  overlay.classList.add("hidden");

  const base = window.location.origin + window.location.pathname.replace("index.html", "");
  const url = base + "ticket.html?id=" + ticketId;
  const checkUrl =
  base + "check.html?id=" + ticketId;

  document.getElementById("shareBox").innerHTML = `
  <p>🎫 チケットID：${ticketId}</p>

  <p>💌 告白URL</p>
  <input id="shareUrl" value="${url}" readonly>

  <button onclick="copyUrl()">
    告白URLコピー
  </button>

  <br><br>

  <p>📊 状態確認URL</p>
  <input id="checkUrl" value="${checkUrl}" readonly>

  <button onclick="copyCheckUrl()">
    状態確認URLコピー
  </button>
`;

}

function copyUrl(){
  const input = document.getElementById("shareUrl");
  input.select();
  document.execCommand("copy");
  alert("コピーしたよ");
}
  
function copyCheckUrl(){

  const input =
    document.getElementById("checkUrl");

  input.select();

  document.execCommand("copy");

  alert("状態確認URLをコピーしたよ");
}
</script>

</body>
</html>
