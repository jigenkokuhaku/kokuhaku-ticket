<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>告白チケット発行</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .ticket {
    width: 360px;
    padding: 28px;
    border-radius: 18px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);

    color: white;
    text-align: center;

    box-shadow: 0 0 30px rgba(0,200,255,0.15);
  }

  h1 {
    margin-bottom: 16px;
    font-size: 22px;
  }

  input, textarea {
    width: 100%;
    margin: 6px 0;
    padding: 10px;

    border-radius: 8px;
    border: none;
    outline: none;
  }

  textarea {
    height: 100px;
    resize: none;
  }

  button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color: white;
    font-weight: bold;

    cursor: pointer;
  }

  button:hover {
    transform: scale(1.02);
  }

  #shareBox {
    margin-top: 16px;
    font-size: 14px;
  }

  input.share {
    width: 100%;
    margin-top: 6px;
  }

  img {
    margin-top: 10px;
    border-radius: 10px;
  }

  .overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background: rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
  }

  .hidden { display:none; }

  .big {
    font-size: 34px;
    font-weight: bold;
  }

  .small {
    opacity: 0.7;
    margin-top: 8px;
  }

</style>
</head>

<body>

<div class="ticket">

  <h1>告白チケット発行</h1>

  <input id="sender" placeholder="あなたの名前">
  <textarea id="message" placeholder="告白を書いてください"></textarea>

  <button onclick="sendTicket()">チケット生成</button>

  <div id="shareBox"></div>

</div>

<!-- 発行演出 -->
<div id="overlay" class="overlay hidden">
  <div>
    <div class="big">PRINTING...</div>
    <div class="small">チケット生成中</div>
  </div>
</div>

<script>

async function sendTicket() {

  const ticketId = Date.now().toString();
  const createdAt = new Date().toISOString();

  const data = {
    ticketId,
    sender: document.getElementById("sender").value,
    message: document.getElementById("message").value,
    status: "pending",
    createdAt
  };

  // 演出表示
  document.getElementById("overlay").classList.remove("hidden");

  await fetch(
    "YOUR_GAS_URL",
    {
      method: "POST",
      body: JSON.stringify(data)
    }
  );

  setTimeout(() => {

    document.getElementById("overlay").classList.add("hidden");

    const baseUrl =
      location.href.replace("index.html", "ticket.html");

    const url =
      baseUrl + "?id=" + ticketId;

    document.getElementById("shareBox").innerHTML = `
      <p>🎫 チケットID：${ticketId}</p>

      <p>🔗 共有URL</p>
      <input class="share" id="shareUrl" value="${url}" readonly>
      <button onclick="copyUrl()">コピー</button>

      <p>📱 QRコード</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}">
    `;

  }, 1500);

}

function copyUrl(){
  const input = document.getElementById("shareUrl");
  input.select();
  document.execCommand("copy");
  alert("コピーしたよ");
}

</script>

</body>
</html>
