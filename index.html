<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta property="og:title"
content="次元告白チケット">

<meta property="og:description"
content="あなたに伝えたい想いがあります。">

<meta property="og:image"
content="https://jigenkokuhaku.github.io/kokuhaku-ticket/ogp.png">

<meta property="og:type"
content="website">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
  rel="icon"
  type="image/png"
  href="img/favicon.png">
  
<title>次元告白チケット発行</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="center-page">
<div class="ticket">

<h2>💌 次元告白チケット発行</h2>

<div class="label">
あなたの名前
</div>

<input
  id="sender"
  placeholder="あなたの名前">

<div class="label">
相手の名前
</div>

<input
  id="receiver"
  placeholder="相手の名前">

<div class="label">
メッセージ
</div>

<textarea
  id="message"
  placeholder="気持ちを書いてみよう..."></textarea>

<button onclick="sendTicket()">
  チケットを発行する
</button>

<div class="small-note">
24時間以内に返答できます
</div>

<div id="shareBox"></div>

</div>

<div id="overlay" class="overlay hidden">
  <div class="big">
    PRINTING...
  </div>
</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

async function sendTicket() {

  const sender =
    document.getElementById("sender")
    .value.trim();

  const receiver =
    document.getElementById("receiver")
    .value.trim();

  const message =
    document.getElementById("message")
    .value.trim();

  if (!sender || !receiver || !message) {

    alert("全部入力してね");

    return;
  }

  const ticketId =
    Date.now().toString()
    + "-"
    + Math.random()
    .toString(36)
    .slice(2,8);

  const data = {

    ticketId,
    sender,
    receiver,
    message,

    status:"pending",

    createdAt:
      new Date().toISOString()
  };

  const overlay =
    document.getElementById("overlay");

  overlay.classList.remove("hidden");

  try {

    const res = await fetch(GAS_URL, {

      method:"POST",

      headers:{
        "Content-Type":"text/plain"
      },

      body:JSON.stringify(data)
    });

    await res.text();

  } catch(e){

    console.log(e);

    alert("送信失敗");
  }

  overlay.classList.add("hidden");

  const base =
    window.location.origin
    + window.location.pathname
    .replace("index.html","");

  const url =
    base + "ticket.html?id="
    + ticketId;

  const checkUrl =
    base + "check.html?id="
    + ticketId;

  document.getElementById("shareBox")
.innerHTML = `

  <div class="label">
    💌 告白URL
  </div>

<textarea
  id="shareUrl"
  readonly>あなたに伝えたい想いがあります。

次元告白チケットが届いています💌

${url}</textarea>

<button onclick="copyShareText()">
  共有メッセージをコピー
</button>

  </a>

  <div class="label">
    📊 ステータス確認URL
  </div>

  <input
    id="checkUrl"
    value="${checkUrl}"
    readonly>

  <button onclick="copyCheckUrl()">
    状態確認URLをコピー
  </button>

  <a href="${checkUrl}" target="_blank">
    <button>
      状態確認ページを開く
    </button>
  </a>

`;
}

function copyShareText(){

  const text =
    document.getElementById("shareUrl").value;

  navigator.clipboard.writeText(text);

  alert("共有メッセージをコピーしたよ");
}

function copyCheckUrl(){

  const input =
    document.getElementById("checkUrl");

  input.select();

  document.execCommand("copy");

  alert("状態確認URLをコピーしたよ");
}

</script>
<a href="about.html" class="about-link">
  このサービスについて
</a>
</body>
</html>
