<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    margin: 0;
  }

  .ticket {
    background: rgba(255, 248, 238, 0.1);
    width: 320px;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,255,255,0.15);
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .message {
    margin: 20px 0;
    font-size: 18px;
    line-height: 1.6;
  }

  #timer {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 10px;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .yes {
    background: #a9d8a9;
  }

  .no {
    background: #ddd;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .popup {
    text-align: center;
    animation: pop 0.5s ease;
  }

  .big-text {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
  }

  .small-text {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
  }

  .hidden {
    display: none;
  }

  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>

<body>

<div class="ticket">

  <h1>次元告白チケット</h1>

  <div id="timer"></div>

  <div id="message" class="message">
    読み込み中...
  </div>

  <button class="yes" onclick="acceptTicket()">
    受け入れる
  </button>

  <button class="no" onclick="declineTicket()">
    辞退する
  </button>

</div>

<div id="overlay" class="overlay hidden">
  <div class="popup">
    <div class="big-text" id="resultText">ACCEPTED</div>
    <div class="small-text">想いを受け取りました</div>
  </div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

const params = new URLSearchParams(location.search);
const ticketId = params.get("id");

/* -----------------------
   データ読み込み（修正版）
----------------------- */
async function loadTicket() {

  if (!ticketId) {
    document.getElementById("message").innerText = "IDがありません";
    return;
  }

  const res = await fetch(GAS_URL + "?id=" + ticketId);
  const data = await res.json();

  console.log(data);

  if (!data.message) {
    document.getElementById("message").innerText = "読み込み失敗";
    return;
  }

  document.getElementById("message").innerText = data.message;
}

/* -----------------------
   24時間カウントダウン（そのまま）
----------------------- */
const deadline = new Date().setTime(parseInt(ticketId.split("-")[0])) + 24 * 60 * 60 * 1000;

function updateTimer() {
  const now = new Date().getTime();
  const diff = deadline - now;

  if (diff <= 0) {
    document.getElementById("timer").innerText = "⛔ 期限切れ";
    return;
  }

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("timer").innerText =
    `⏳ 残り ${h}h ${m}m ${s}s`;
}

setInterval(updateTimer, 1000);
updateTimer();

/* -----------------------
   受諾
----------------------- */
async function acceptTicket() {

  showOverlay("ACCEPTED", "想いを受け取りました");

  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      ticketId,
      status: "accepted"
    })
  });
}

/* -----------------------
   辞退
----------------------- */
async function declineTicket() {

  showOverlay("DECLINED", "この想いは保留されました");

  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      ticketId,
      status: "declined"
    })
  });
}

/* -----------------------
   演出
----------------------- */
function showOverlay(title, subtitle) {

  document.getElementById("resultText").innerText = title;
  document.querySelector(".small-text").innerText = subtitle;

  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hidden");

  setTimeout(() => {
    overlay.classList.add("hidden");
  }, 2000);
}

loadTicket();

</script>

</body>
</html>
