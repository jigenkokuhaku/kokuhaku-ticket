<!DOCTYPE html>
      border: none;
      border-radius: 12px;
      margin: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .yes {
      background: #a9d8a9;
    }

    .no {
      background: #ddd;
    }

  </style>
</head>

<body>

  <div class="ticket">

    <h1>特別告白券</h1>

    <div id="message" class="message">
      読み込み中...
    </div>

    <button
      class="yes"
      onclick="acceptTicket()">

      受け入れる

    </button>

    <button class="no">

      辞退する

    </button>

  </div>

  <script>

    const params =
      new URLSearchParams(location.search);

    const ticketId =
      params.get("id");

    async function loadTicket() {

      const response = await fetch(
        "https://script.google.com/macros/s/AKfycbxjpQKHPSwHYvebRxQVr_Lo2I_bGRdboJRNLCf40WbkzP2pQmnKgUxmBp9QIy4_CC-TaA/exec?id=" + ticketId
      );

      const data = await response.json();

      document.getElementById("message")
        .innerText = data.message;

    }

    async function acceptTicket() {

      await fetch(
        "https://script.google.com/macros/s/AKfycbxjpQKHPSwHYvebRxQVr_Lo2I_bGRdboJRNLCf40WbkzP2pQmnKgUxmBp9QIy4_CC-TaA/exec",
        {
          method: "POST",

          body: JSON.stringify({
            ticketId: ticketId,
            status: "accepted"
          })
        }
      );

      alert("想いを受け取りました");

    }

    loadTicket();

  </script>

</body>

</html>
