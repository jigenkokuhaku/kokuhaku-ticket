<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  
  <meta property="og:title"
content="次元告白チケット">

<meta property="og:description"
content="あなたに伝えたい想いがあります。">

<meta property="og:image"
content="https://jigenkokuhaku.github.io/kokuhaku-ticket/ogp.png">

<meta property="og:type"
content="website">
  
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

  <link
  rel="icon"
  type="image/png"
  href="favicon.png">
  
<title>次元告白チケット</title>
<style>
  body {
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    margin: 0;
  }

  .ticket {
    background: rgba(255, 248, 238, 0.1);
    width: 320px;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,255,255,0.15);
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .message {
    margin: 20px 0;
    font-size: 18px;
    line-height: 1.6;
  }

  #timer {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 10px;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .yes {
    background: #a9d8a9;
  }

  .no {
    background: #ddd;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .popup {
    text-align: center;
    animation: pop 0.5s ease;
  }

  .big-text {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
  }

  .small-text {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
  }

  .hidden {
    display: none;
  }

  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

#hearts{

  position:fixed;
  inset:0;

  pointer-events:none;

  overflow:hidden;

  z-index:9999;
}

.heart{

  position:absolute;

  bottom:-20px;

  font-size:24px;

  animation:
    floatUp 3s linear forwards;
}

@keyframes floatUp{

  0%{
    transform:
      translateY(0)
      scale(0.8);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{

    transform:
      translateY(-110vh)
      scale(1.4)
      rotate(20deg);

    opacity:0;
  }
}

.home-link{

  position:fixed;

  top:20px;
  left:20px;

  color:white;

  text-decoration:none;

  font-weight:bold;

  letter-spacing:1px;

  opacity:0.8;

  z-index:1000;
}

.home-link:hover{

  opacity:1;
}  
</style>
</head>

<body>
<a href="index.html" class="home-link">
  💌次元告白チケット
</a>
<div class="ticket">

  <h1>💌 次元告白チケット</h1>

  <div id="timer"></div>

  <div id="meta"></div>

  <div id="message" class="message">
    読み込み中...
  </div>

  <button class="yes" onclick="acceptTicket()">
    受け入れる
  </button>

  <button class="no" onclick="declineTicket()">
    辞退する
  </button>

</div>

<div id="overlay" class="overlay hidden">
  <div class="popup">
    <div class="big-text" id="resultText">ACCEPTED</div>
    <div class="small-text">想いを受け取りました</div>
  </div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

const params = new URLSearchParams(location.search);
const ticketId = params.get("id");

/* -----------------------
   データ読み込み（修正版）
----------------------- */
async function loadTicket() {

  if (!ticketId) {
    document.getElementById("message").innerText = "IDがありません";
    return;
  }

  const res = await fetch(GAS_URL + "?id=" + ticketId);
  const data = await res.json();

  console.log(data);

  if (!data.message) {
    document.getElementById("message").innerText = "読み込み失敗";
    return;
  }

  document.getElementById("meta").innerHTML = `
  <div>From: ${data.sender}</div>
  <div>To: ${data.receiver}</div>
`;
  
  document.getElementById("message").innerText = data.message;
  window.currentStatus = data.status;

  if (
  data.status === "accepted" ||
  data.status === "declined"
) {

  disableButtons(data.status);

}
}

/* -----------------------
   24時間カウントダウン（そのまま）
----------------------- */
const deadline = new Date().setTime(parseInt(ticketId.split("-")[0])) + 24 * 60 * 60 * 1000;

function updateTimer() {
  const now = new Date().getTime();
  if(window.currentStatus &&
   window.currentStatus !== "pending"){

  document.getElementById("timer").innerText =
    "✅ 回答済み";

  return;
}
  const diff = deadline - now;

  if (diff <= 0) {
    document.getElementById("timer").innerText = "⛔ 期限切れ";
    return;
  }

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("timer").innerText =
    `⏳ 残り ${h}h ${m}m ${s}s`;
}

setInterval(updateTimer, 1000);
updateTimer();

/* -----------------------
   受諾
----------------------- */
async function acceptTicket() {

  showOverlay("ACCEPTED", "想いを受け取りました");
  launchHearts();

  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      ticketId,
      status: "accepted"
    })
  });

await loadTicket();
}

/* -----------------------
   辞退
----------------------- */
async function declineTicket() {

  showOverlay("DECLINED", "この想いは保留されました");

  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      ticketId,
      status: "declined"
    })
  });

await loadTicket();
}

/* -----------------------
   演出
----------------------- */
function showOverlay(title, subtitle) {

  document.getElementById("resultText").innerText = title;
  document.querySelector(".small-text").innerText = subtitle;

  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hidden");

  setTimeout(() => {
    overlay.classList.add("hidden");
  }, 2000);
}

function launchHearts(){

  const container =
    document.getElementById("hearts");

  for(let i=0;i<24;i++){

    const heart =
      document.createElement("div");

    heart.className = "heart";

    heart.innerText = "💖";

    heart.style.left =
      Math.random() * 100 + "vw";

    heart.style.animationDelay =
      Math.random() * 1.2 + "s";

    heart.style.fontSize =
      (20 + Math.random()*24) + "px";

    container.appendChild(heart);

    setTimeout(()=>{

      heart.remove();

    },4000);
  }
}

/* -----------------------
   ボタン無効化
----------------------- */
function disableButtons(status){

  const yesBtn =
    document.querySelector(".yes");

  const noBtn =
    document.querySelector(".no");

  yesBtn.disabled = true;
  noBtn.disabled = true;

  yesBtn.style.opacity = 0.5;
  noBtn.style.opacity = 0.5;

  if(status === "accepted"){

    yesBtn.innerText = "✓ ACCEPTED";
    noBtn.style.display = "none";

  }

  if(status === "declined"){

    noBtn.innerText = "✓ DECLINED";
    yesBtn.style.display = "none";

  }

}
  
loadTicket();

</script>
<div id="hearts"></div>
</body>
</html>
