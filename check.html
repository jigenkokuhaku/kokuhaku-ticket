<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  
  <meta property="og:title"
content="次元告白チケット">

<meta property="og:description"
content="あなたに伝えたい想いがあります。">

<meta property="og:image"
content="https://jigenkokuhaku.github.io/kokuhaku-ticket/ogp.png">

<meta property="og:type"
content="website">

  <meta name="viewport"
content="width=device-width, initial-scale=1.0">

  <link
  rel="icon"
  type="image/png"
  href="favicon.png">
  
<title>告白ステータス確認</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:
    radial-gradient(circle at top,#1a1a2e,#000);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.card{
  width:360px;
  padding:28px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.15);
}

h1{
  margin-top:0;
  font-size:24px;
}

.names{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

.message{
  margin-top:20px;
  line-height:1.7;
  font-size:18px;
  white-space:pre-wrap;
}

.status{
  margin-top:28px;
  font-size:26px;
  font-weight:bold;
}

.pending{
  color:#ffd966;
}

.accepted{
  color:#8cffb2;
}

.declined{
  color:#ff9b9b;
}

.small{
  margin-top:10px;
  opacity:0.7;
  font-size:13px;
}
.home-link{

  position:fixed;

  top:20px;
  left:20px;

  color:white;

  text-decoration:none;

  font-weight:bold;

  letter-spacing:1px;

  opacity:0.8;

  z-index:1000;
}

.home-link:hover{

  opacity:1;
}
</style>
</head>

<body>
<a href="index.html" class="home-link">
  💌次元告白チケット
</a>
<div class="card">

  <h1>告白ステータス</h1>

  <div class="names" id="names">
    読み込み中...
  </div>

  <div class="message" id="message"></div>

  <div class="status" id="status"></div>

  <div class="small" id="createdAt"></div>

  <div class="small" id="answeredAt"></div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

const params = new URLSearchParams(location.search);
const ticketId = params.get("id");

async function loadStatus(){

  if(!ticketId){

    document.getElementById("names").innerText =
      "チケットIDがありません";

    return;
  }

  try{

    const res =
      await fetch(GAS_URL + "?id=" + ticketId);

    const data = await res.json();

    console.log(data);

    if(data.error){

      document.getElementById("names").innerText =
        "チケットが見つかりません";

      return;
    }

    // 名前表示
    document.getElementById("names").innerText =
      `${data.sender} → ${data.receiver}`;

    // メッセージ表示
    document.getElementById("message").innerText =
      data.message;

    // 日付
    const created =
  new Date(data.createdAt).toLocaleString("ja-JP");

     document.getElementById("createdAt").innerText =
  "発行日時: " + created;

    if(data.answeredAt){

  const answered =
  new Date(data.answeredAt).toLocaleString("ja-JP");

     document.getElementById("answeredAt").innerText =
  "回答日時: " + answered;

     }

    // ステータス
    const statusEl =
      document.getElementById("status");

    if(data.status === "pending"){

      statusEl.innerHTML =
        "🟡 PENDING";

      statusEl.className =
        "status pending";

    }
    else if(data.status === "accepted"){

      statusEl.innerHTML =
        "🟢 ACCEPTED";

      statusEl.className =
        "status accepted";

    }
    else if(data.status === "declined"){

      statusEl.innerHTML =
        "🔴 DECLINED";

      statusEl.className =
        "status declined";

    }

  }catch(err){

    console.log(err);

    document.getElementById("names").innerText =
      "読み込み失敗";

  }

}

loadStatus();
setInterval(loadStatus, 5000);

</script>

</body>
</html>
