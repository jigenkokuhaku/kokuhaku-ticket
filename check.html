<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  
  <meta property="og:title"
content="次元告白チケット">

<meta property="og:description"
content="あなたに伝えたい想いがあります。">

<meta property="og:image"
content="https://jigenkokuhaku.github.io/kokuhaku-ticket/ogp.png">

<meta property="og:type"
content="website">

  <meta name="viewport"
content="width=device-width, initial-scale=1.0">

  <link
  rel="icon"
  type="image/png"
  href="favicon.png">
  
<title>告白ステータス確認</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="center-page">
  
<a href="index.html" class="home-link">
  💌次元告白チケット
</a>
<div class="card">

  <h2>告白ステータス</h2>

  <div class="names" id="names">
    読み込み中...
  </div>

  <div class="message" id="message"></div>

  <div class="status" id="status"></div>

  <div class="small" id="createdAt"></div>

  <div class="small" id="answeredAt"></div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyAucuaQ-jclQmju5wzjUSXbH2aJs_TTDgk-d02H40CBi2WvmLPE1tNK3kdJMwXFIsirQ/exec";

const params = new URLSearchParams(location.search);
const ticketId = params.get("id");

async function loadStatus(){

  if(!ticketId){

    document.getElementById("names").innerText =
      "チケットIDがありません";

    return;
  }

  try{

    const res =
      await fetch(GAS_URL + "?id=" + ticketId);

    const data = await res.json();

    console.log(data);

    if(data.error){

      document.getElementById("names").innerText =
        "チケットが見つかりません";

      return;
    }

    // 名前表示
    document.getElementById("names").innerText =
      `${data.sender} → ${data.receiver}`;

    // メッセージ表示
    document.getElementById("message").innerText =
      data.message;

    // 日付
    const created =
  new Date(data.createdAt).toLocaleString("ja-JP");

     document.getElementById("createdAt").innerText =
  "発行日時: " + created;

    if(data.answeredAt){

  const answered =
  new Date(data.answeredAt).toLocaleString("ja-JP");

     document.getElementById("answeredAt").innerText =
  "回答日時: " + answered;

     }

    // ステータス
    const statusEl =
      document.getElementById("status");

    if(data.status === "pending"){

      statusEl.innerHTML =
        "🟡 PENDING";

      statusEl.className =
        "status pending";

    }
    else if(data.status === "accepted"){

      statusEl.innerHTML =
        "🟢 ACCEPTED";

      statusEl.className =
        "status accepted";

    }
    else if(data.status === "declined"){

      statusEl.innerHTML =
        "🔴 DECLINED";

      statusEl.className =
        "status declined";

    }

  }catch(err){

    console.log(err);

    document.getElementById("names").innerText =
      "読み込み失敗";

  }

}

loadStatus();
setInterval(loadStatus, 5000);

</script>

</body>
</html>
